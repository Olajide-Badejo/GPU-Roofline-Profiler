name: ci

# CI has no GPU. It compiles every kernel with nvcc (compile only), runs the
# Python unit tests, the linters, the dash lint, and a LaTeX compile check
# against the committed sample dataset. GPU correctness and GPU performance are
# not testable here, and that is stated plainly rather than papered over.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  python:
    name: python tests, lint, dash lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: install dependencies
        run: python -m pip install -r requirements.txt
      - name: dash lint
        run: python scripts/check_no_dashes.py
      - name: ruff
        run: python -m ruff check python
      - name: pytest
        run: python -m pytest python -q

  cuda-compile:
    name: nvcc compile only (no GPU)
    runs-on: ubuntu-latest
    container: nvidia/cuda:12.8.0-devel-ubuntu22.04
    steps:
      - uses: actions/checkout@v4
      - name: compile every kernel, compile only
        run: |
          shopt -s nullglob
          files=(src/kernels/*.cu src/profiling/*.cu)
          if [ ${#files[@]} -eq 0 ]; then
            echo "no .cu sources yet; nothing to compile"
            exit 0
          fi
          for f in "${files[@]}"; do
            echo "compiling $f"
            nvcc -std=c++17 -arch=sm_120 -Isrc/include -c "$f" -o /dev/null
          done

  report:
    name: latex compile check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: install a minimal tex toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            texlive-latex-base texlive-latex-recommended \
            texlive-latex-extra texlive-fonts-recommended \
            texlive-science latexmk
      - name: build the main report
        run: make -C report pdf
      - name: upload report PDF
        uses: actions/upload-artifact@v4
        with:
          name: main-report
          path: report/main.pdf

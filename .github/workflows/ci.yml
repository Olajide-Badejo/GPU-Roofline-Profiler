name: ci

# CI runs on a machine with no GPU. It compiles every CUDA kernel with nvcc
# (compile only, no device needed), runs the Python unit tests and linters,
# checks the dash style rule, and rebuilds the LaTeX report from the committed
# sample dataset so the uploaded PDF is the real thing rather than a stub. GPU
# correctness and performance are validated locally on the RTX 5070, not here,
# and that boundary is stated plainly rather than papered over.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  python:
    name: python tests, lint, dash lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: install dependencies
        run: python -m pip install --upgrade pip -r requirements.txt
      - name: dash lint
        run: python scripts/check_no_dashes.py
      - name: ruff
        run: python -m ruff check python
      - name: pytest
        run: python -m pytest python -q

  cuda-compile:
    name: nvcc compile only (no GPU)
    runs-on: ubuntu-latest
    container: nvidia/cuda:12.8.0-devel-ubuntu22.04
    steps:
      # The CUDA devel image has the toolkit but not git, which actions/checkout
      # needs, so install it before checking out.
      - name: install git
        run: |
          apt-get update
          apt-get install -y --no-install-recommends git ca-certificates
      - uses: actions/checkout@v4
      - name: compile every kernel and profiling unit, compile only
        # The CUDA container runs this under sh (dash), not bash, so this stays
        # POSIX: find instead of a bash nullglob array, and no shopt.
        run: |
          set -e
          count=0
          for f in $(find src/kernels src/profiling -name '*.cu' | sort); do
            echo "compiling $f"
            nvcc -std=c++17 -arch=sm_120 -Isrc/include -c "$f" -o /dev/null
            count=$((count + 1))
          done
          if [ "$count" -eq 0 ]; then
            echo "no .cu sources found"
            exit 1
          fi
          echo "$count translation units compiled clean"

  report:
    name: rebuild report from sample data
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: install python dependencies
        run: python -m pip install --upgrade pip -r requirements.txt
      - name: install a minimal tex toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            texlive-latex-base texlive-latex-recommended \
            texlive-latex-extra texlive-fonts-recommended \
            texlive-science latexmk
      - name: regenerate figures and tables from the committed sample run
        run: |
          python python/cli.py \
            --results results/sample_run \
            --report report \
            --peaks results/sample_run/peaks.csv \
            --ncu results/sample_run/ncu
      - name: build the main report
        run: make -C report pdf
      - name: upload report PDF
        uses: actions/upload-artifact@v4
        with:
          name: main-report
          path: report/main.pdf

# Benchmark sweep definition. Changing the sweep happens here and never in
# source: the driver reads this file, resolves it into a list of (kernel,
# config) cells, and records the resolved copy into each run's manifest.
#
# Sizes are chosen to span the arithmetic intensity axis and to fit comfortably
# in the RTX 5070's 12 GB while it is also driving the display. The driver checks
# cudaMemGetInfo before each allocation and skips any cell that does not fit,
# with a log line, so an over-large entry here degrades gracefully rather than
# crashing.

harness:
  warmup_iterations: 10      # discarded: clock ramp and cache warming
  timed_batches: 20          # >= 10 required by spec; more shows real variance
  launches_per_batch: 50     # many launches between one event pair, then divide
  vram_headroom_mib: 1536    # leave room for the display; skip cells that break it

# Elementwise and reduction kernels anchor the memory-bound left edge.
saxpy:
  sizes: [1048576, 4194304, 16777216, 67108864]   # 1M to 64M elements
  block_sizes: [128, 256, 512]

reduction:
  # Deliberately includes non power of two sizes to exercise the tail handling.
  sizes: [1000003, 1048576, 16777216, 67108864]
  block_sizes: [256, 512]

transpose:
  # Square matrices; the naive vs tiled delta is the cleanest demo in the suite.
  sizes: [1024, 2048, 4096, 8192]
  tile_dims: [16, 32]

gemv:
  # Rows x cols; sits in the middle of the intensity axis.
  sizes:
    - {m: 4096, n: 4096}
    - {m: 8192, n: 8192}
    - {m: 16384, n: 4096}
  block_sizes: [128, 256]

gemm:
  # Square GEMM ladder. The curated profiling subset uses the 2048
  # and 4096 sizes only, since Nsight Compute replays each kernel many times.
  sizes: [512, 1024, 2048, 4096]
  variants: [naive, tiled, register_blocked, vectorized, cublas]
  tile_dim: 32
  # Register blocking: each thread computes a thread_tile x thread_tile output
  # block, raising reuse per shared-memory load.
  thread_tile: 4

# Curated subset actually profiled with Nsight Compute. Kept small on purpose:
# ncu replays each kernel per metric set, so this is minutes per cell.
ncu_subset:
  saxpy: [16777216]
  transpose: [4096]
  gemm:
    naive: [2048]
    tiled: [2048, 4096]
    register_blocked: [4096]
    vectorized: [4096]
    cublas: [4096]
